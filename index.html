<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gu Yuan Digital Museum</title>
    <meta
      name="description"
      content="A bilingual digital museum and research archive dedicated to Gu Yuan."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/styles.css?v=20260528-featured-direct" />
    <script src="/src/js/main.js?v=20260528-featured-direct" defer></script>
  </head>
  <body data-lang="en">
    <header class="site-header">
      <div class="header-inner">
        <div class="header-left">
          <a class="brand" href="/" aria-label="Gu Yuan Digital Museum home">
            <img src="/logo-transparent.png" alt="Gu Yuan Digital Museum Logo" class="logo" />
          </a>
        </div>
        <nav class="main-nav" aria-label="Main navigation" data-nav>
          <button class="language-toggle" type="button" data-language-toggle>中文</button>
        </nav>
        <a class="button button-primary header-button" href="#works" data-primary-cta></a>
      </div>
    </header>

    <main id="top">
      <section class="hero">
        <div class="hero-bg" aria-hidden="true"></div>
        <div class="hero-inner">
          <div class="hero-copy reveal">
            <p class="eyebrow pill" data-hero-eyebrow></p>
            <h1><span data-hero-title></span></h1>
            <p class="hero-lede" data-hero-lede></p>
            <p class="hero-lede hero-secondary" data-hero-secondary></p>
            <div class="hero-actions">
              <a class="button button-primary" href="#works" data-hero-primary></a>
              <a class="button button-outline" href="#life" data-hero-secondary-link></a>
            </div>
          </div>

          <div class="gallery-frame reveal" aria-label="Featured Gallery" data-featured-gallery></div>
        </div>
      </section>

      <section class="archive-note-band" data-research-notes></section>

      <section id="about" class="authorization-section">
        <div class="authorization-inner">
          <div class="authorization-heading" data-about-heading></div>
          <div class="authorization-copy" data-about></div>
        </div>
      </section>

      <section id="works" class="section works-section">
        <div class="section-heading works-heading" data-works-heading></div>
        <p class="collection-intro" data-works-intro></p>
        <div class="museum-feature-layout" data-works></div>
      </section>

      <section id="life" class="timeline-section">
        <div class="timeline-inner">
          <div data-life-heading></div>
          <div class="timeline-content">
            <div class="timeline-list" data-timeline></div>
            <div class="life-stage-grid" data-life-stages></div>
          </div>
        </div>
      </section>

      <section id="archive" class="section">
        <div class="section-heading" data-archive-heading></div>
        <div class="archive-grid" data-archive></div>
      </section>

      <section id="guardian" class="guardian-section">
        <div class="guardian-inner">
          <div class="guardian-copy" data-guardian-copy></div>
          <div class="guardian-panel" aria-label="Family archive contributors" data-guardian-panel></div>
        </div>
      </section>

      <section id="portrait-archive" class="portrait-archive-section">
        <div class="portrait-archive-inner">
          <div class="section-heading" data-portrait-archive-heading></div>
          <div class="portrait-archive-grid" data-portrait-archive-grid></div>
        </div>
      </section>

      <section id="collections" class="museum-sections">
        <div class="museum-sections-inner">
          <div class="section-heading" data-collections-heading></div>
          <div class="museum-grid" data-collections></div>
        </div>
      </section>

      <section id="exhibitions" class="section">
        <div class="section-heading" data-exhibitions-heading></div>
        <div class="exhibition-grid" data-exhibitions></div>
      </section>

      <section id="research" class="research-section">
        <div class="research-inner">
          <div data-research-heading></div>
          <div class="research-copy" data-research></div>
        </div>
      </section>

      <section id="support" class="support-section">
        <div class="support-inner">
          <div class="section-heading support-heading" data-support-heading></div>
          <div class="support-grid" data-support-cards></div>
          <p class="support-disclaimer" data-support-note></p>
          <div class="support-detail-sections" data-support-sections></div>
        </div>
      </section>
    </main>

    <footer class="site-footer" data-footer></footer>

    <dialog class="artwork-modal" id="artwork-modal" aria-labelledby="modal-title">
      <div class="artwork-modal-inner">
        <button class="modal-close" type="button" aria-label="Close artwork viewer">&times;</button>
        <img id="modal-image" alt="" hidden />
        <div class="modal-caption">
          <h3 id="modal-title"></h3>
          <p id="modal-title-zh"></p>
          <p id="modal-meta"></p>
        </div>
      </div>
    </dialog>
  </body>
</html>
